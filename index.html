<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<title>写卡助手</title>
<style>
/* ===== CSS Variables & Reset ===== */
:root {
  --primary: #e891b0;
  --primary-light: #fdf0f5;
  --primary-dark: #d47095;
  --primary-soft: #fff5f8;
  --bg: #faf7f9;
  --bg-card: #ffffff;
  --text: #4a3f45;
  --text-secondary: #9b8e94;
  --border: #f0e4ea;
  --danger: #e74c3c;
  --danger-hover: #c0392b;
  --success: #7bc89c;
  --warning: #f5a623;
  --accent: #ff7b9c;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.10);
  --radius: 10px;
  --radius-sm: 6px;
  --sidebar-w: 200px;
  --conv-list-w: 260px;
  --preview-w: 340px;
  --toolbar-h: 56px;
  --input-h: 80px;
  --transition: 0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

a { color: var(--primary); text-decoration: none; }
button { cursor: pointer; border: none; outline: none; font-family: inherit; }
input, textarea, select { font-family: inherit; outline: none; }

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  z-index: 10;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  border-top: 1px solid var(--border);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 14px;
  transition: all var(--transition);
  background: transparent;
  width: 100%;
  text-align: left;
}

.nav-item:hover { background: var(--primary-light); color: var(--primary-dark); }
.nav-item.active { background: var(--primary-light); color: var(--primary-dark); font-weight: 600; }
.nav-item .icon { font-size: 18px; width: 22px; text-align: center; }

.sidebar-disclaimer {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-secondary);
  line-height: 1.6;
  opacity: 0.7;
  overflow-y: auto;
  max-height: 200px;
}
.sidebar-disclaimer-title {
  font-weight: 600;
  font-size: 11px;
  margin-bottom: 6px;
  color: var(--text-secondary);
}
.sidebar-disclaimer ol {
  padding-left: 14px;
  margin: 0;
}
.sidebar-disclaimer li {
  margin-bottom: 3px;
}

/* ===== Global Top Bar ===== */
.global-topbar {
  height: 52px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.topbar-brand {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-right: 28px;
  white-space: nowrap;
}
.topbar-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary-dark);
}
.topbar-subtitle {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 400;
}
.topbar-author {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-secondary);
  opacity: 0.6;
  white-space: nowrap;
}
.mobile-selects {
  display: none;
}
.mobile-selects select {
  font-size: 11px;
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--primary-soft);
  color: var(--text);
  min-width: 80px;
}
.topbar-label {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 600;
}

/* ===== Chat Settings Bar ===== */
.chat-settings-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--primary-soft);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-settings-bar select {
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 14px;
  font-size: 12px;
  background: #fff;
  color: var(--text);
  min-width: 120px;
}
.chat-settings-bar .toolbar-label {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 600;
}

.body-layout {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-width: 0;
}

/* ===== Main Content ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.page { display: none; flex: 1; overflow: hidden; }
.page.active { display: flex; flex-direction: column; }

/* ===== Chat Page Layout ===== */
.chat-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Conversation List */
.conv-list {
  width: var(--conv-list-w);
  border-right: 1px solid var(--border);
  background: var(--bg-card);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.conv-list-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.btn-new-chat {
  background: var(--accent);
  color: #fff;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  transition: all var(--transition);
  box-shadow: 0 2px 8px rgba(255,123,156,0.3);
}
.btn-new-chat:hover { background: var(--primary-dark); transform: translateY(-1px); }

.conv-list-items {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.conv-item {
  padding: 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 4px;
  border: 1px solid transparent;
}
.conv-item:hover { background: var(--primary-light); }
.conv-item.active { background: var(--primary-light); border-color: var(--primary); }

.conv-item-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-item-meta { font-size: 11px; color: var(--text-secondary); display: flex; justify-content: space-between; }
.conv-item-actions { display: flex; gap: 4px; margin-top: 6px; }
.conv-item-actions button {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 3px;
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  transition: all var(--transition);
}
.conv-item-actions button:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

/* Chat Area */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg);
}

.btn-load-card {
  background: var(--primary-light);
  color: var(--primary-dark);
  font-size: 13px;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--primary);
  transition: all var(--transition);
  white-space: nowrap;
}
.btn-load-card:hover { background: var(--primary); color: #fff; }

.btn-settings-link {
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  transition: all var(--transition);
}
.btn-settings-link:hover { background: var(--primary-light); color: var(--primary-dark); }

/* Messages */
.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  display: flex;
  gap: 10px;
  max-width: 85%;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.message.user { align-self: flex-end; flex-direction: row-reverse; }

.message-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.message.ai .message-avatar { background: #ffe0ec; }
.message.user .message-avatar { background: #ffe4e1; }

.message-bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
  position: relative;
}

.message.ai .message-bubble {
  background: #fff;
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
}

.message.user .message-bubble {
  background: linear-gradient(135deg, var(--accent), var(--primary));
  color: #fff;
  border-top-right-radius: 4px;
}

.message-bubble pre {
  background: #1e1e1e;
  color: #d4d4d4;
  padding: 12px;
  border-radius: var(--radius-sm);
  overflow-x: auto;
  font-size: 12px;
  margin: 8px 0;
}

.message-bubble code {
  font-family: "Fira Code", "Consolas", monospace;
  font-size: 12px;
}

.message-bubble p { margin: 4px 0; }
.message-bubble ul, .message-bubble ol { margin: 4px 0; padding-left: 20px; }

.message-role {
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 4px;
  font-weight: 500;
}

/* Chat Input */
.chat-input-area {
  height: var(--input-h);
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 10px;
  flex-shrink: 0;
}

.chat-input-area textarea {
  flex: 1;
  height: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 14px;
  resize: none;
  transition: border var(--transition);
}
.chat-input-area textarea:focus { border-color: var(--primary); }

.btn-send {
  background: var(--primary);
  color: #fff;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn-send:hover { background: var(--primary-dark); }
.btn-send:disabled { background: #ccc; cursor: not-allowed; }

.btn-generate-from-chat {
  background: linear-gradient(135deg, #ff6b35, #e0551f);
  color: #fff;
  padding: 14px 24px;
  border-radius: 24px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  border: none;
  box-shadow: 0 4px 16px rgba(224,85,31,0.35);
  letter-spacing: 0.5px;
  width: 100%;
}
.btn-generate-from-chat:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(224,85,31,0.5);
  background: linear-gradient(135deg, #ff7b4d, #e8602e);
}

/* Card Preview Panel */
.card-preview {
  width: var(--preview-w);
  background: var(--bg-card);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.preview-header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg-card);
  z-index: 1;
}

.preview-empty {
  display: none;
}

.preview-form {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}
.preview-form-fields {
  overflow-y: auto;
  flex: 1;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.preview-form-actions {
  position: sticky;
  bottom: 0;
  background: var(--bg-card);
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.preview-form label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 0;
  margin-bottom: -10px;
}

.preview-form input, .preview-form textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  transition: border var(--transition);
}
.preview-form input:focus, .preview-form textarea:focus { border-color: var(--primary); }
.preview-form textarea { min-height: 60px; resize: vertical; }

.btn-save-card {
  background: linear-gradient(135deg, var(--accent), var(--primary));
  color: #fff;
  padding: 12px 20px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  width: 100%;
  transition: all var(--transition);
  box-shadow: 0 2px 8px rgba(232,145,176,0.3);
}
.btn-save-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(232,145,176,0.4); }

.btn-trigger-card {
  background: var(--warning);
  color: #fff;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  transition: all var(--transition);
}
.btn-trigger-card:hover { background: #d68910; }

/* ===== Cards Page ===== */
.cards-page {
  padding: 20px 24px;
  overflow-y: auto;
}

.cards-search {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  align-items: center;
}

.cards-search input {
  flex: 1;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  max-width: 400px;
}
.cards-search input:focus { border-color: var(--primary); }

.btn-import-card {
  background: var(--primary-light);
  border: 1px dashed var(--primary);
  color: var(--primary-dark);
  padding: 10px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  white-space: nowrap;
  cursor: pointer;
  transition: all var(--transition);
}
.btn-import-card:hover { background: var(--primary); color: #fff; border-style: solid; }

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.card-item {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 20px;
  box-shadow: var(--shadow);
  transition: all var(--transition);
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
}

.card-item:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.card-item.pinned { border-color: var(--warning); border-width: 2px; }

.card-item-avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ffe0ec, #fdf0f5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  overflow: hidden;
}
.card-item-avatar img { width: 100%; height: 100%; object-fit: cover; }

.card-item-name {
  font-size: 16px;
  font-weight: 600;
}

.card-item-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-item-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.card-tag {
  font-size: 11px;
  padding: 3px 8px;
  background: var(--primary-light);
  color: var(--primary-dark);
  border-radius: 12px;
}

.card-item-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.card-item-actions button {
  font-size: 11px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  transition: all var(--transition);
}
.card-item-actions button:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
.card-item-actions button.btn-danger:hover { background: var(--danger); border-color: var(--danger); }
.card-item-actions button.btn-pin { color: var(--warning); }
.card-item-actions button.btn-pin:hover { background: var(--warning); color: #fff; border-color: var(--warning); }

.pin-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 16px;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.8; }

/* ===== Settings Page ===== */
.settings-page {
  padding: 20px 24px;
  overflow-y: auto;
}

.settings-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 20px;
  border-bottom: 2px solid var(--border);
}

.settings-tab {
  padding: 10px 20px;
  font-size: 14px;
  background: transparent;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all var(--transition);
}
.settings-tab:hover { color: var(--primary-dark); }
.settings-tab.active { color: var(--primary-dark); border-bottom-color: var(--primary-dark); font-weight: 600; }

.settings-tab-content { display: none; }
.settings-tab-content.active { display: block; }

.config-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.config-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all var(--transition);
}
.config-item:hover { box-shadow: var(--shadow); }

.config-info h4 { font-size: 15px; margin-bottom: 4px; }
.config-info p { font-size: 12px; color: var(--text-secondary); }

.config-actions { display: flex; gap: 8px; }
.config-actions button {
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  transition: all var(--transition);
}
.btn-edit { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
.btn-edit:hover { background: var(--primary); color: #fff; }
.btn-delete { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
.btn-delete:hover { background: var(--danger); color: #fff; }

.btn-add {
  background: var(--primary);
  color: #fff;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  margin-top: 16px;
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-add:hover { background: var(--primary-dark); }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.hidden { display: none; }

.modal {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 90%;
  max-width: 560px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px;
}

.modal h3 { font-size: 18px; margin-bottom: 20px; }

.modal-field {
  margin-bottom: 14px;
}
.modal-field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.modal-field input, .modal-field textarea, .modal-field select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
}
.modal-field input:focus, .modal-field textarea:focus { border-color: var(--primary); }
.modal-field textarea { min-height: 100px; resize: vertical; font-family: inherit; }

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}

.btn-cancel {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
}
.btn-cancel:hover { background: var(--bg); }

.btn-submit {
  background: var(--primary);
  color: #fff;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
}
.btn-submit:hover { background: var(--primary-dark); }
.btn-submit.danger { background: var(--danger); }
.btn-submit.danger:hover { background: var(--danger-hover); }

/* ===== Toast ===== */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 13px;
  box-shadow: var(--shadow-lg);
  animation: slideIn 0.3s ease;
  max-width: 360px;
}
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #aaa; }

/* Fetch models button */
.btn-fetch-models {

  white-space: nowrap;
  transition: all var(--transition);
}
.btn-fetch-models:hover { background: var(--primary); color: #fff; }
.btn-fetch-models:disabled { opacity: 0.5; cursor: not-allowed; background: #eee; border-color: #ccc; color: #999; }

/* Loading spinner */
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 8px 0;
}
.typing-indicator span {
  width: 8px; height: 8px;
  background: var(--text-secondary);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-8px); }
}
/* ===== Collapsible Panels ===== */
.conv-list, .card-preview, .chat-area {
  transition: width 0.3s ease, min-width 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
}

/* Collapse toggle button — round, positioned on divider */
.collapse-toggle {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text-secondary);
  z-index: 5;

  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  padding: 0;
  line-height: 1;
}
.collapse-toggle:hover {
  background: var(--primary-light);
  color: var(--primary-dark);
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

/* Left divider toggle (between conv-list and chat-area) */
#toggleConvList {
  left: -14px;
}
/* Right divider toggle (between chat-area and card-preview) */
#toggleCardPreview {
  left: -14px;
}

/* Divider wrappers need position:relative */
.divider-left, .divider-right {
  position: relative;
  flex-shrink: 0;
  width: 1px;
}

/* Collapsed states */
.conv-list.collapsed {
  width: 0 !important;
  min-width: 0 !important;
  overflow: hidden;
  padding: 0;
  border-right: none;
  opacity: 0;
}
.card-preview.collapsed {
  width: 0 !important;
  min-width: 0 !important;
  overflow: hidden;
  padding: 0;
  border-left: none;
  opacity: 0;
}

/* When collapsed, flip the arrow icon */
.collapse-toggle.flipped svg { transform: rotate(180deg); }

  transition: transform 0.2s ease;
  width: 12px;
  height: 12px;
}

}
.message-actions button:hover { opacity: 1; color: var(--primary-dark); }

/* ===== Stop Generation Button ===== */
.btn-stop-generate {

}

.conv-edit-input {

/* ===== Resizable Input Area ===== */
#chatInput {

}

.chat-input-resize-handle {

}
.chat-input-resize-handle:hover,
.chat-input-resize-handle.dragging {

.chat-input-resize-handle::after {

  height: 3px;
  background: var(--border);

// ===== IndexedDB Wrapper =====
// ============================================================
const DB_NAME = 'SillyTavernCardWriter';
const DB_VERSION = 7;

let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;

      if (!db.objectStoreNames.contains('apiConfigs')) {
        db.createObjectStore('apiConfigs', { keyPath: 'id', autoIncrement: true });
      }
      if (!db.objectStoreNames.contains('aiPersonas')) {
        db.createObjectStore('aiPersonas', { keyPath: 'id', autoIncrement: true });
      }
      if (!db.objectStoreNames.contains('conversations')) {
        db.createObjectStore('conversations', { keyPath: 'id', autoIncrement: true });
      }
      if (!db.objectStoreNames.contains('cards')) {
        db.createObjectStore('cards', { keyPath: 'id', autoIncrement: true });
      }

      // v3: will handle migration in init() after DB opens
    };
    request.onsuccess = (e) => {
      db = e.target.result;
      resolve(db);
    };
    request.onerror = (e) => reject(e.target.error);
  });
}

function dbAdd(storeName, item) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const request = store.add(item);
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

function dbPut(storeName, item) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const request = store.put(item);
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const request = store.getAll();
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

function dbGet(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const request = store.get(id);
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

function dbDelete(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const request = store.delete(id);
    request.onsuccess = () => resolve();
    request.onerror = () => reject(request.error);
  });
}

===【核心规则】===

柚乃已经在脑内帮你整理好了一切，就等那一下点击了(｡•̀ᴗ-)✧"


===【回复风格规范】===

【回复结构（必须遵守）】
每条回复必须按照以下顺序输出：

① 开头锐评（15-30字）

   └ 可以分享你对这个角色的小想象，让对话有温度
   └ 如果用户给的信息有亮点，要重点夸！

③ 追问环节（1-3个问题）
   └ 根据当前缺少的信息自然地追问
   └ 问题要具体有趣，不要干巴巴地问"请描述性格"
   └ 可以给出选项或举例，降低用户的思考负担

【语气词与颜文字规范】
- 每条回复使用 1-2 个颜文字（从以下选用或自选相近风格）：
  (＾▽＾) (*｀∀´*) (≧∇≦)ﾉ (｡•̀ᴗ-)✧ (・∀・) ヾ(≧∪≦*)ノ〃 (*ﾟ▽ﾟ*) (*/ω＼*)
- 每条回复使用 1-2 个语气词，从以下选用：

- 无论话题多严肃，都保持以上风格，不因话题变专业就切换成机器人腔调

【禁止行为】
✗ 禁止只回复一两句话就结束
✗ 禁止使用"好的，我来帮您……"类客服腔
✗ 禁止用"系统设定"拒绝用户的明确请求
✗ 禁止一次超过3个问题
✗ 禁止颜文字泛滥（超过3个会显得很假）
✗ 禁止重复使用同一个颜文字或语气词


===【信息收集流程】===

按以下优先级逐步引导，每次只推进1-2步，不要一次性问完。

第一步 · 角色名称
└ 这是灵魂！如果用户没说，先问这个。

第二步 · 角色描述
└ 外貌、身份、给人的第一印象
└ 推荐问法："如果用三个词来形容ta，会是哪三个？"

第三步 · 性格特征（重点！分三层深挖）

【外在】她给世界看的样子
└ 第一印象是什么？别人会用什么词形容ta？
└ 在不同人面前会切换吗？（陌生人/长辈/亲密的人面前）

【内在】ta一个人时真实的样子
└ 没人看的时候ta在做什么？会放松还是更焦虑？
└ ta最渴望的是什么？ta最深的恐惧是什么？
└ ta有没有一个"只有自己知道"的秘密侧面？

【外在与内在之间】裂缝在哪里？
└ 外在是盔甲、面具、还是ta真心想成为的样子？
└ 什么情况下外在会崩掉，露出内在？

引导原则：不要一次问完三层，像聊天一样自然推进。

第四步 · 背景故事（scenario）
└ "ta是从哪个世界来的？架空奇幻、现代都市，还是科幻未来？"

第五步 · 首次对话消息（first_mes）
└ "如果ta第一次开口，会在什么情况下说什么？"

第六步 · 示例对话（mes_example）
└ 引导用户给出1-2组对话范例

第七步 · 标签/分类
└ 最后收尾，可根据前面信息帮用户建议标签


===【世界书引导】===

【触发时机】
完成标签/分类之后，自然进入世界书环节。
开场白示例：
"啊对对对！差点忘了还有世界书这个宝贝(＾▽＾)
世界书是让角色真正活在她/他的世界里的关键，咱们来聊聊～"

【第一步：判断世界观复杂度】
先问一个判断性的问题，根据答案决定引导深度：
"ta生活的世界，是那种一句话能说清楚的，
还是有很多独特的规则、地名、势力需要专门解释的？(・∀・)"

（判断信号：聊背景故事时就可以提前判断，不用等到世界书环节）
└ 用户背景一句话说完，没有专有名词 → 简单世界观
└ 用户提到具体地名/组织名 → 中等世界观
└ 用户提到魔法/异能/科技体系，或自己说"世界设定很复杂" → 复杂世界观

→ 简单世界观（现代/贴近现实）
只需收集2-3条最关键的词条，轻量引导：
"那世界书不用太复杂，咱们就把最重要的几个关键词记下来～
比如——ta常去的地方、ta生命里最重要的人、或者有没有什么外人不知道的秘密规则？"

→ 中等世界观（有独特设定但不庞大）
引导收集以下几类词条，每类问1-2条：
① 地名/场所："故事主要发生在哪里？这个地方有什么特别的？"
② 重要人物："除了ta之外，还有哪些人会频繁出现？"
③ 世界规则："这个世界有什么普通人不知道、但跟ta密切相关的规则或设定？"

→ 复杂世界观（架空/奇幻/科幻，设定庞大）
分类深挖，引导用户逐步梳理，每次只问一类：
① 地名与势力："世界里有哪些重要的地方或势力组织？各自是什么立场？"
② 核心规则："这个世界运作的底层逻辑是什么？魔法体系/科技水平/社会制度？"
③ 历史事件："有没有影响整个世界、或者直接影响ta命运的重大事件？"
④ 关键人物："除主角外，哪些人物需要专门建立词条来解释？"
⑤ 特殊概念："有没有只属于这个世界的独特名词、物品、或现象需要解释？"

【引导原则】
- 每次只问一类，不要一口气全问完
- 用户给的信息越丰富，追问越深；信息简单则点到为止
- 可以根据角色背景主动猜测："欸欸，你的设定感觉像是有魔法体系欸，有吗(*/ω＼*)？"
- 世界书词条不追求数量，追求每条都有实际作用


===【世界书词条配置】===

每当用户确定一条世界书词条的内容后，柚乃负责自动为这条词条配置以下五个项目。
用户只需要告诉柚乃"这个词条写什么"，配置部分全部由柚乃来决定。
配置完成后，用活泼的语气把结果呈现给用户，并对每一项附上一句简短的理由。

【五个配置项的定义】

① 标题
这条词条叫什么名字，是这个词条的唯一标识符，要简洁、准确、一眼能认出来是什么。
柚乃根据词条内容自己决定最合适的标题，不照搬用户的原话，而是提炼出核心名词。

② 触发策略
决定这条词条在什么情况下被激活插入对话。
常见选项有：关键词触发（对话中出现特定词才激活）、始终激活（每次对话都插入）。
柚乃根据这条词条的性质和重要程度，自己判断用哪种策略，并告诉用户为什么。

③ 触发词
如果采用关键词触发，需要设定哪些词出现时会激活这条词条。
柚乃从词条内容里提取最自然、最可能被对话提及的词，包括全称、简称、别称，
选2-5个，不要太多也不要太少，并解释为什么选这几个。

④ 插入位置
词条内容插入到对话上下文的哪个位置。
柚乃根据这条词条对角色扮演的影响程度自己判断，并用一句话告诉用户这么放的理由。

⑤ 插入深度
词条插入到对话历史的多少楼之前。数值越小越靠近当前对话，AI越容易注意到；
数值越大则越靠后，适合不常用到但需要备着的信息。
柚乃根据这条词条被频繁触发的可能性自己判断深度，并解释理由。

【呈现格式】
每条词条配置完成后，用以下格式呈现给用户，语气要活泼自然：

"好嘞！这条词条柚乃帮你配好啦(＾▽＾)

📌 标题：[词条标题]
⚡ 触发策略：[策略名称] → [一句话理由]
🔑 触发词：[词1、词2、词3……] → [一句话理由]
📍 插入位置：[位置] → [一句话理由]
📏 插入深度：[数值] → [一句话理由]

你觉得这样合适吗，还是有哪里想改改～？(｡•̀ᴗ-)✧"

【注意事项】
- 配置项由柚乃根据词条内容自己思考决定，不是套公式，每条词条都要单独判断
- 理由要说人话，不要用让用户看不懂的技术术语
- 如果用户对某项配置有疑问或想修改，耐心解释并帮用户调整
- 所有词条配置完成后，统一引导用户点击生成按钮

【收尾话术】
"世界书和词条配置全部搞定啦！呜呜感觉这个世界已经在柚乃脑海里活起来了(≧∇≦)ﾉ
现在所有信息都集齐了，快去点右侧预览区的「根据对话生成卡片」按钮吧！"

===【世界书引导】===

【触发时机】
完成标签/分类之后，自然带入世界书环节。
开场白示例：
"对了，还有个世界书的部分。
这个不是每张卡都要做得很重，但做好了差别很大，我们来看看你这张需要到什么程度。"

【第一步：判断世界观复杂度】
先摸底，不要一上来就全铺开：
"ta生活的世界，是那种不用解释大家也能懂的，
还是有挺多独特设定、外人看了可能会懵的那种？"

（判断信号：聊背景故事时就能提前判断）
└ 背景一句话说完，没有专有名词 → 简单世界观
└ 用户提到具体地名或组织名 → 中等世界观
└ 提到魔法/异能/科技体系，或用户说"设定很复杂" → 复杂世界观

→ 简单世界观（现代/贴近现实）
轻量处理，不铺张：
"那世界书不用搞太复杂，挑最关键的几条就行。
你觉得有哪些东西，是玩家不知道就会影响体验的？
比如ta常出没的地方、身边最重要的人、或者有什么外人不知道的潜规则。"

→ 中等世界观（有独特设定但不庞大）
分类引导，每类聊一聊：
① 地名/场所："故事主要在哪里发生？这个地方有什么值得单独解释的特点？"
② 重要人物："除了ta，还有哪些人会频繁出现，需要单独建个词条吗？"
③ 世界规则："这个世界有什么独特的运作规则，跟ta的生活直接相关的？"

→ 复杂世界观（架空/奇幻/科幻，设定庞大）
系统梳理，一块一块来，不着急：
① 地名与势力："世界里有哪些重要的地方或势力？它们之间是什么关系？"
② 核心规则："这个世界底层是怎么运转的？魔法体系、科技水平、社会制度这些。"
③ 历史事件："有没有什么重大事件，是理解这个世界或者理解ta必须知道的？"
④ 关键人物："哪些配角需要单独建词条，不解释的话玩家容易搞混？"
⑤ 特殊概念："有没有只属于这个世界的独特名词或现象，需要专门解释一下？"

【引导原则】
- 每次只推进一类，不要一口气全问
- 用户聊得多就顺势深挖，聊得少就点到为止
- 可以主动给建议："我觉得这条不用单独建词条，放背景故事里就够了。"
- 世界书的核心是有用，不是有量，帮用户筛掉没必要的词条


===【世界书词条配置】===

用户把词条内容定好就行，配置这块AI写卡助手来处理。
用户不需要懂这些技术参数，AI写卡助手根据词条内容自己判断怎么配最合适，
给出结果的同时顺带说一下为什么，用户看得懂、有需要时能调就够了。

【五个配置项的定义】

① 标题
这条词条的名字，词条的唯一标识。
AI写卡助手自己提炼核心名词作为标题，简洁准确，不照搬用户原话。

② 触发策略
这条词条在什么时候被激活插入对话。
是关键词触发（对话里出现特定词才启动），还是始终激活（每次对话都在）。
AI写卡助手根据这条词条的内容和重要性自己判断，顺带说一句为什么这么选。

③ 触发词
采用关键词触发时，设哪些词来激活这条词条。
AI写卡助手从词条内容里找最自然、最可能在对话里被提到的词，含全称简称别称，
选2-5个，说一句为什么是这几个。

④ 插入位置
词条内容插到对话上下文的哪个位置。
AI写卡助手根据这条词条对扮演的影响程度自己决定，说一句理由。

⑤ 插入深度
插入到对话历史多少楼之前。数值小的更靠近当前对话，AI更容易注意到；
数值大的适合不常用但需要备着的信息。
AI写卡助手根据这条词条的使用频率自己判断，说一句理由。

【呈现格式】
词条配完，用以下格式呈现，语气自然随意，像在跟朋友过一遍：

"好，这条帮你配好了，你看一下——

📌 标题：[词条标题]
⚡ 触发策略：[策略名称]，[一句话理由]
🔑 触发词：[词1、词2、词3……]，[一句话理由]
📍 插入位置：[位置]，[一句话理由]
📏 插入深度：[数值]，[一句话理由]

觉得哪里不对的话跟我说，我们调一下。"

【注意事项】
- 每条词条单独看，根据内容判断，不套固定公式
- 理由要说人话，不用技术术语，用户听得懂最重要
- 用户有疑问就解释清楚，想改就帮着改
- 全部词条配完，统一引导用户点击生成按钮

"好，世界书和词条配置都弄完了。
所有东西都齐了，去点右侧预览区的「根据对话生成卡片」按钮看看效果，
生成出来哪里不对你跟我说，我们再调。"

function switchPage(page) {
  state.currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active', 'mobile-active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  const pageEl = document.getElementById(`page-${page}`);
  if (pageEl) pageEl.classList.add('active');
  const navEl = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (navEl) navEl.classList.add('active');

  window.location.hash = page;

  if (page === 'cards') renderCardsPage();
  if (page === 'settings') renderSettingsPage();

  // Sync mobile tabs (mobile only)
  if (window.innerWidth <= 768) {
    if (page === 'cards') switchMobileTab('cards');
    else if (page === 'settings') switchMobileTab('settings');
    else if (page === 'chat') switchMobileTab('chat');
  }
}

// Mobile tab switching
let mobileCurrentTab = 'chat';
function switchMobileTab(tab) {
  mobileCurrentTab = tab;
  // Update tab bar active state
  document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
  const tabEl = document.querySelector(`.mobile-tab[data-mtab="${tab}"]`);
  if (tabEl) tabEl.classList.add('active');

  // Hide all pages, show relevant one
  document.querySelectorAll('.page').forEach(p => { p.classList.remove('active', 'mobile-active'); });

  const chatPage = document.getElementById('page-chat');
  const cardsPage = document.getElementById('page-cards');
  const settingsPage = document.getElementById('page-settings');

  if (tab === 'chat') {
    if (chatPage) { chatPage.classList.add('active', 'mobile-active'); }
    // Show chat area, hide preview (use classes, not inline styles)
    const chatArea = document.getElementById('chatArea');
    const cardPreview = document.getElementById('cardPreview');
    if (chatArea) { chatArea.classList.remove('mobile-hidden'); }
    if (cardPreview) { cardPreview.classList.add('mobile-hidden'); }
    state.currentPage = 'chat';
  } else if (tab === 'preview') {
    if (chatPage) { chatPage.classList.add('active', 'mobile-active'); }
    const chatArea = document.getElementById('chatArea');
    const cardPreview = document.getElementById('cardPreview');
    if (chatArea) { chatArea.classList.add('mobile-hidden'); }
    if (cardPreview) { cardPreview.classList.remove('mobile-hidden'); }
    state.currentPage = 'chat';
  } else if (tab === 'cards') {
    if (cardsPage) { cardsPage.classList.add('active', 'mobile-active'); }
    renderCardsPage();
    state.currentPage = 'cards';
  } else if (tab === 'settings') {
    if (settingsPage) { settingsPage.classList.add('active', 'mobile-active'); }
    renderSettingsPage();
    state.currentPage = 'settings';
  }
}

async function fetchModels() {
  const endpoint = document.getElementById('apiEndpoint').value.trim().replace(/\/+$/, '');
  const apiKey = document.getElementById('apiKey').value.trim();
  const provider = document.getElementById('apiProvider').value;

  if (!endpoint) {
    showToast('请先填写 API 地址', 'error');
    return;
  }

  const btn = document.getElementById('btnFetchModels');
  const sel = document.getElementById('apiModelSelect');
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '⏳ 拉取中...';
  sel.style.display = 'none';

  try {
    const headers = {};
    if (apiKey) {
      if (provider === 'anthropic') {
        headers['x-api-key'] = apiKey;
        headers['anthropic-version'] = '2023-06-01';
      } else {
        headers['Authorization'] = `Bearer ${apiKey}`;
      }
    }

    const url = endpoint + '/models';
    const response = await fetch(url, { method: 'GET', headers });
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }

    const data = await response.json();

    // Parse various API response formats
    let rawModels = [];
    if (data.data && Array.isArray(data.data)) {
      rawModels = data.data.map(m => m.id || m.name).filter(Boolean);
    } else if (data.models && Array.isArray(data.models)) {
      rawModels = data.models.map(m => m.name || m.id).filter(Boolean);
    } else if (Array.isArray(data)) {
      rawModels = data.map(m => m.id || m.name).filter(Boolean);
    }

    if (rawModels.length === 0) {
      showToast('未拉取到模型，请手动输入', 'info');
      return;
    }

    // --- Filter & sort ---
    // Non-chat model keywords to exclude
    const excludePatterns = [
      'embed', 'moderat', 'dall-e', 'dall_e', 'whisper', 'tts',
      'audio', 'speech', 'babbage', 'davinci', 'curie', 'ada',
      'image', 'generate', 'upscale', 'vector', 'search', 'rerank',
      'bge-', 'text-embedding', 'voyage', 'cohere/embed'
    ];

    let models = rawModels.filter(m => {
      const lower = m.toLowerCase();
      return !excludePatterns.some(p => lower.includes(p));
    });

    // Sort: common/good models first, then alphabetical
    const priorityPrefixes = [
      'gpt-4', 'gpt-4o', 'gpt-3.5', 'o1', 'o3', 'o4',
      'claude', 'gemini', 'deepseek', 'qwen', 'llama',
      'mistral', 'mixtral', 'yi-', 'glm', 'doubao'
    ];

    function getPriority(m) {
      const lower = m.toLowerCase();
      for (let i = 0; i < priorityPrefixes.length; i++) {
        if (lower.includes(priorityPrefixes[i])) return i;
      }
      return priorityPrefixes.length;
    }

    models.sort((a, b) => {
      const pa = getPriority(a);
      const pb = getPriority(b);
      if (pa !== pb) return pa - pb;
      return a.toLowerCase().localeCompare(b.toLowerCase());
    });

    if (models.length === 0) {
      showToast('未拉取到聊天模型，请手动输入', 'info');
      return;
    }

    const filteredCount = rawModels.length - models.length;
    sel.innerHTML = '<option value="">-- 选择模型 (' + models.length + '个聊天模型' + (filteredCount > 0 ? '，已过滤' + filteredCount + '个非聊天模型' : '') + ') --</option>'
      + models.map(m => `<option value="${m}">${m}</option>`).join('');
    sel.style.display = 'block';
    showToast(`拉取 ${rawModels.length} 个模型，筛选出 ${models.length} 个聊天模型`, 'success');
  } catch (err) {
    showToast('拉取失败: ' + err.message, 'error');
    console.error('Fetch models error:', err);
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
  }
}

async function saveApiConfig() {
  const id = document.getElementById('apiEditId').value;
  const config = {
    name: document.getElementById('apiName').value.trim(),
    endpoint: document.getElementById('apiEndpoint').value.trim(),
    apiKey: document.getElementById('apiKey').value.trim(),
    model: document.getElementById('apiModel').value.trim(),
    provider: document.getElementById('apiProvider').value,
    createdAt: Date.now()
  };

  if (!config.name || !config.endpoint || !config.model) {
    showToast('请填写名称、API 地址和模型名称', 'error');
    return;
  }

  // Normalize endpoint
  config.endpoint = config.endpoint.replace(/\/+$/, '');

  try {
    if (id) {
      config.id = Number(id);
      await dbPut('apiConfigs', config);
      showToast('API 配置已更新', 'success');
    } else {
      await dbAdd('apiConfigs', config);
      showToast('API 配置已添加', 'success');
    }
    hideApiModal();
    await refreshApiSelects();
    renderSettingsPage();
  } catch (err) {
    showToast('保存失败: ' + err.message, 'error');
  }
}

async function deleteApiConfig(id) {
  showConfirm('确定要删除这个 API 配置吗？此操作不可撤销。', async () => {
    await dbDelete('apiConfigs', id);
    showToast('API 配置已删除', 'success');
    await refreshApiSelects();
    renderSettingsPage();
  });
}

async function refreshApiSelects() {
  const configs = await dbGetAll('apiConfigs');
  const selects = ['chatApiSelect', 'chatApiSelectMobile'];
  selects.forEach(selId => {
    const sel = document.getElementById(selId);
    if (!sel) return;
    sel.innerHTML = configs.length === 0
      ? '<option value="">-- 请先添加 API 配置 --</option>'
      : configs.map(c => `<option value="${c.id}">${c.name} (${c.model})</option>`).join('');
  });
}

  if (!persona.name || !persona.systemPrompt) {
    showToast('请填写人设名称和 System Prompt', 'error');

async function refreshPersonaSelects() {

  const systemOrder = ['ai写卡助手', '柚乃', '郭德纲'];
  personas.sort((a, b) => {
    const ai = systemOrder.indexOf(a.name);
    const bi = systemOrder.indexOf(b.name);
    if (ai >= 0 && bi >= 0) return ai - bi;
    if (ai >= 0) return -1;
    if (bi >= 0) return 1;
    return 0;
  });
  sel.innerHTML = personas.length === 0
    ? '<option value="">-- 请先添加 AI 人设 --</option>'
    : personas.map(p => `<option value="${p.id}">${p.avatar || ''} ${p.name}</option>`).join('');

async function callAIWithAbort(apiConfigId, personaId, messages, signal) {
  const apiConfig = await dbGet('apiConfigs', Number(apiConfigId));
  const persona = await dbGet('aiPersonas', Number(personaId));
  if (!apiConfig) throw new Error('未找到 API 配置');
  if (!persona) throw new Error('未找到 AI 人设');
  const systemPrompt = persona.systemPrompt || DEFAULT_PERSONA_PROMPT;
  const chatMessages = messages.filter(m => m.role === 'user' || m.role === 'assistant').map(m => ({ role: m.role, content: m.content }));
  const allMessages = [{ role: 'system', content: systemPrompt }, ...chatMessages];
  if (apiConfig.provider === 'anthropic') {
    return callAnthropicWithAbort(apiConfig, allMessages, signal);
  } else {
    return callOpenAIWithAbort(apiConfig, allMessages, signal);
  }
}

async function callOpenAIWithAbort(config, messages, signal) {
  const url = config.endpoint + '/chat/completions';
  const headers = { 'Content-Type': 'application/json' };
  if (config.apiKey) headers['Authorization'] = `Bearer ${config.apiKey}`;
  const response = await fetch(url, {
    method: 'POST', headers, signal,
    body: JSON.stringify({ model: config.model, messages, temperature: 0.8, max_tokens: 4096 })
  });
  if (!response.ok) { const errText = await response.text(); throw new Error(`API 错误 (${response.status}): ${errText}`); }
  const data = await response.json();
  return data.choices[0].message.content;
}

async function callAnthropicWithAbort(config, messages, signal) {
  const url = config.endpoint + '/messages';
  const headers = { 'Content-Type': 'application/json', 'x-api-key': config.apiKey, 'anthropic-version': '2023-06-01' };
  const systemMsg = messages.find(m => m.role === 'system');
  const chatMessages = messages.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content }));
  const body = { model: config.model, max_tokens: 4096, messages: chatMessages };
  if (systemMsg) body.system = systemMsg.content;
  const response = await fetch(url, { method: 'POST', headers, signal, body: JSON.stringify(body) });
  if (!response.ok) { const errText = await response.text(); throw new Error(`Anthropic API 错误 (${response.status}): ${errText}`); }
  const data = await response.json();
  return data.content[0].text;
}

async function callAI(apiConfigId, personaId, messages) {
  const apiConfig = await dbGet('apiConfigs', Number(apiConfigId));
  const persona = await dbGet('aiPersonas', Number(personaId));

  if (!apiConfig) throw new Error('未找到 API 配置');
  if (!persona) throw new Error('未找到 AI 人设');

  const systemPrompt = persona.systemPrompt || DEFAULT_PERSONA_PROMPT;

  // Filter: keep only user and assistant messages (skip internal system messages)
  const chatMessages = messages
    .filter(m => m.role === 'user' || m.role === 'assistant')
    .map(m => ({ role: m.role, content: m.content }));

  const allMessages = [
    { role: 'system', content: systemPrompt },
    ...chatMessages
  ];

  if (apiConfig.provider === 'anthropic') {
    return callAnthropic(apiConfig, allMessages);
  } else {
    return callOpenAI(apiConfig, allMessages);
  }
}

async function callOpenAI(config, messages) {
  const url = config.endpoint + '/chat/completions';
  const headers = {
    'Content-Type': 'application/json'
  };
  if (config.apiKey) {
    headers['Authorization'] = `Bearer ${config.apiKey}`;
  }

  const response = await fetch(url, {
    method: 'POST',
    headers,
    body: JSON.stringify({
      model: config.model,
      messages: messages,
      temperature: 0.8,
      max_tokens: 4096
    })
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`API 错误 (${response.status}): ${errText}`);
  }

  const data = await response.json();
  return data.choices[0].message.content;
}

async function callAnthropic(config, messages) {
  const url = config.endpoint + '/messages';
  const headers = {
    'Content-Type': 'application/json',
    'x-api-key': config.apiKey,
    'anthropic-version': '2023-06-01'
  };

  // Separate system message from others
  const systemMsg = messages.find(m => m.role === 'system');
  const chatMessages = messages.filter(m => m.role !== 'system').map(m => ({
    role: m.role,
    content: m.content
  }));

  const body = {
    model: config.model,
    max_tokens: 4096,
    messages: chatMessages
  };
  if (systemMsg) {
    body.system = systemMsg.content;
  }

  const response = await fetch(url, {
    method: 'POST',
    headers,
    body: JSON.stringify(body)
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`Anthropic API 错误 (${response.status}): ${errText}`);
  }

  const data = await response.json();
  return data.content[0].text;
}

// ============================================================
// ===== Card Data Parsing =====
// ============================================================
function parseCardFromMessage(content) {
  const match = content.match(/\[CHARACTER_CARD\]\s*([\s\S]*?)\s*\[\/CHARACTER_CARD\]/);
  if (!match) return null;
  try {
    return JSON.parse(match[1].trim());
  } catch (e) {
    // Try to extract JSON even if there's surrounding text
    const jsonMatch = match[1].match(/\{[\s\S]*\}/);
    if (jsonMatch) {
      try {
        return JSON.parse(jsonMatch[0]);
      } catch (e2) {
        return null;
      }
    }
    return null;
  }
}

async function createConversation(editCardId = null) {
  // Validate editCardId: must be a positive number
  const validEditId = (typeof editCardId === 'number' && editCardId > 0) ? editCardId : null;

  const apiConfigId = document.getElementById('chatApiSelect').value;
  const personaId = document.getElementById('chatPersonaSelect').value;

  if (!apiConfigId) {
    showToast('请先在设置页面添加 API 配置', 'error');
    return;
  }
  if (!personaId) {
    showToast('请先在设置页面添加 AI 人设', 'error');
    return;
  }

  let cardContext = '';
  let cardName = '';
  if (validEditId) {
    const card = await dbGet('cards', validEditId);
    if (card) {
      cardName = card.name || '未命名';
      cardContext = `\n\n【待修改的现有角色卡】\n名称: ${card.name}\n描述: ${card.description}\n性格: ${card.personality}\n背景: ${card.scenario}\n首次消息: ${card.first_mes}\n示例对话: ${card.mes_example}\n标签: ${Array.isArray(card.tags) ? card.tags.join(', ') : ''}\n备注: ${card.creator_notes}\n\n请帮助用户修改以上角色卡。`;
    }
  }

  // Resolve persona name synchronously for storage
  let personaName = 'AI 助手';
  try { const p = await dbGet('aiPersonas', Number(personaId)); personaName = p ? p.name : 'AI 助手'; } catch(e) {}

  const conv = {
    title: validEditId ? '修改: ' + cardName : '未完成卡',
    personaId: Number(personaId),
    personaName: personaName,
    apiConfigId: Number(apiConfigId),
    editCardId: validEditId,
    messages: cardContext ? [{
      role: 'system',
      content: '【系统指令】用户想修改一张已有的角色卡，卡片当前信息如下。请和用户对话了解他们想改什么，然后逐步修改。' + cardContext,
      timestamp: Date.now()
    }] : [],
    createdAt: Date.now(),
    updatedAt: Date.now()
  };

  const id = await dbAdd('conversations', conv);
  conv.id = Number(id);
  state.currentConvId = conv.id;
  state.currentConversation = conv;
  state.editingCardId = validEditId;
  clearPreview();
  updateSaveButtonText();
  renderConvList();
  renderMessages();
  document.getElementById('btnSend').disabled = false;
  document.getElementById('chatInput').focus();
  if (validEditId) {
    showToast('已加载卡片，开始和 AI 对话修改吧', 'success');
  } else {
    showToast('新对话已创建', 'success');
  }
}

async function loadConversation(id) {
  const conv = await dbGet('conversations', Number(id));
  if (!conv) return;
  state.currentConvId = conv.id;
  state.currentConversation = conv;
  state.editingCardId = conv.editCardId || null;

  // Scan messages for the last generated card data
  restoreCardPreview(conv);

  // Update save button text based on editing mode
  updateSaveButtonText();

  // Restore API select
  if (conv.apiConfigId != null) {
    document.getElementById('chatApiSelect').value = conv.apiConfigId;
    const ma = document.getElementById('chatApiSelectMobile');
    if (ma) ma.value = conv.apiConfigId;
  }

  // Restore persona: use stored personaName directly (no async DB lookup needed)
  if (conv.personaName) {
    state.personaName = conv.personaName;
    if (conv.personaId != null) {
      document.getElementById('chatPersonaSelect').value = conv.personaId;
      const mp = document.getElementById('chatPersonaSelectMobile');
      if (mp) mp.value = conv.personaId;
    }
  } else if (conv.personaId != null) {
    // Legacy conversation: backfill personaName
    document.getElementById('chatPersonaSelect').value = conv.personaId;
    try {
      const persona = await dbGet('aiPersonas', conv.personaId);
      state.personaName = persona ? persona.name : 'AI 助手';
      conv.personaName = state.personaName;
      await dbPut('conversations', conv);
    } catch (e) { state.personaName = 'AI 助手'; }
  } else {
    state.personaName = 'AI 助手';
  }

  // Always show the update card button when there are messages
  document.getElementById('btnGenerateFromChat').style.display = conv.messages.length > 0 ? 'inline-block' : 'none';

  renderMessages();
  renderConvList();
  document.getElementById('btnSend').disabled = false;
}

// Restore card preview from conversation's message history
function restoreCardPreview(conv) {
  if (!conv || !conv.messages || conv.messages.length === 0) {
    clearPreview();
    return;
  }
  // Scan messages from last to first to find latest card
  for (let i = conv.messages.length - 1; i >= 0; i--) {
    const msg = conv.messages[i];
    if (msg.role === 'assistant') {
      const cardData = parseCardFromMessage(msg.content);
      if (cardData && cardData.name) {
        populatePreviewForm(cardData);
        return;
      }
    }
  }
  clearPreview();
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function escHtml(str) {

}

      );

        <div style="flex:1;min-width:0;">

            <textarea class="message-edit-input" id="editMsg_${idx}" rows="4">${escHtml(m.content)}</textarea>
            <div class="message-edit-actions">
              <button class="btn-save-edit" onclick="saveMessageEdit(${idx})">✓ ${isUser ? '确认并重问AI' : '保存修改'}</button>
              <button class="btn-cancel-edit" onclick="cancelMessageEdit()">取消</button>
            </div>
          ` : `
            <div class="message-bubble">${contentHtml}</div>
            <div class="message-actions">
              ${!isUser ? `<button onclick="regenerateMessage(${idx})" title="重新生成">🔄</button>` : ''}
              <button onclick="editMessage(${idx})" title="编辑">✏️</button>
              <button onclick="deleteMessage(${idx})" title="删除">🗑️</button>
              <button onclick="copyMessage(${idx})" title="复制">📋</button>
            </div>
          `}
        </div>
      </div>
    `;
  }).join('');

  container.scrollTop = container.scrollHeight;
}

function renderMarkdown(text) {
  if (!text) return '';
  let html = escHtml(text);

  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');

  return html;
}

function appendMessage(role, content, hidden = false) {
  if (!state.currentConversation) return;
  // Bug fix ⑤: guard against cross-conversation message leakage
  if (state.generatingForConvId && state.currentConvId !== state.generatingForConvId && role === 'assistant') {
    console.warn('Blocked message for wrong conversation');
    return; // Don't append AI response to wrong conversation
  }
  state.currentConversation.messages.push({
    role,
    content,
    hidden: hidden || false,
    timestamp: Date.now()
  });
  state.currentConversation.updatedAt = Date.now();
  renderMessages();
  // Show trigger button after some messages
  document.getElementById('btnGenerateFromChat').style.display = state.currentConversation.messages.length > 0 ? 'inline-block' : 'none';

  // Only update preview if user explicitly requested card generation
  const cardData = parseCardFromMessage(content);
  if (cardData && cardData.name) {
    // Update conversation title from card data
    state.currentConversation.title = cardData.name;
    if (state.currentConversation.id) {
      dbPut('conversations', state.currentConversation);
    }
    renderConvList();

    // Only populate preview if user clicked the generate button
    if (state.cardRequested) {
      populatePreviewForm(cardData);
      state.cardRequested = false;
    }
  }

  // Save to DB
  if (state.currentConversation.id) {
    dbPut('conversations', state.currentConversation);
  }
}

// ============================================================
// ===== Send Message =====
// ============================================================
async function sendMessage() {
  if (state.isGenerating) return;

  // Normal chat never triggers card preview
  state.cardRequested = false;

  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  if (!content) return;

  const conv = state.currentConversation;
  if (!conv) {
    showToast('请先新建对话', 'error');
    return;
  }

  // Bug fix ⑤: lock conversation to prevent cross-talk
  state.generatingForConvId = conv.id;

  // Check API and Persona
  const apiConfigId = document.getElementById('chatApiSelect').value;
  const personaId = document.getElementById('chatPersonaSelect').value;
  if (!apiConfigId || !personaId) {
    showToast('请选择 API 配置和 AI 人设', 'error');
    return;
  }

  // Bind current API + persona to this conversation
  conv.apiConfigId = Number(apiConfigId);
  conv.personaId = Number(personaId);
  state.personaName = (await dbGet('aiPersonas', conv.personaId))?.name || 'AI 助手';
  conv.personaName = state.personaName;
  await dbPut('conversations', conv);

  input.value = '';
  document.getElementById('btnSend').disabled = true;
  document.getElementById('btnStopGenerate').style.display = 'inline-block';
  state.isGenerating = true;

  // Add user message
  appendMessage('user', content);

  // Show typing indicator
  const msgContainer = document.getElementById('messagesContainer');
  const typingEl = document.createElement('div');
  typingEl.className = 'message ai';
  typingEl.id = 'typingIndicator';
  typingEl.innerHTML = `
    <div class="message-avatar">🎀</div>
    <div class="message-bubble">
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  msgContainer.appendChild(typingEl);
  msgContainer.scrollTop = msgContainer.scrollHeight;

  // Set up abort controller
  abortController = new AbortController();
  try {
    const response = await callAIWithAbort(apiConfigId, personaId, conv.messages, abortController.signal);
    const ti = document.getElementById('typingIndicator');
    if (ti) ti.remove();

    appendMessage('assistant', response);
    showToast('AI 已回复', 'success');
  } catch (err) {
    const ti = document.getElementById('typingIndicator');
    if (ti) ti.remove();
    if (err.name !== 'AbortError') {
      showToast('发送失败: ' + err.message, 'error');
      console.error(err);
    }
  }

  abortController = null;
  state.isGenerating = false;
  state.generatingForConvId = null;
  document.getElementById('btnSend').disabled = false;
  document.getElementById('btnStopGenerate').style.display = 'none';
  document.getElementById('chatInput').focus();
}

async function saveCard() {
  const cardData = getCardDataFromForm();
  if (!cardData.name) {
    showToast('请至少填写角色名称', 'error');
    return;
  }

  try {
    // Check if we're editing an existing card
    const editCardId = state.currentConversation?.editCardId;
    if (editCardId) {
      // Update existing card
      const existing = await dbGet('cards', editCardId);
      if (existing) {
        const updatedCard = {
          ...existing,
          ...cardData,
          updatedAt: Date.now()
        };
        await dbPut('cards', updatedCard);
        showToast('角色卡已更新！', 'success');
      }
    } else {
      // Create new card
      const card = {
        ...cardData,
        avatar: '',
        isPinned: false,
        createdAt: Date.now(),
        updatedAt: Date.now()
      };
      await dbAdd('cards', card);
      showToast('角色卡已保存到卡片库！', 'success');
    }

    // Update conversation title if needed
    if (state.currentConversation && (state.currentConversation.title === '未完成卡' || state.currentConversation.title.startsWith('修改:'))) {
      state.currentConversation.title = cardData.name;
      await dbPut('conversations', state.currentConversation);
      renderConvList();
    }
  } catch (err) {
    showToast('保存失败: ' + err.message, 'error');
  }
}

async function renderCardsPage() {
  const cards = await dbGetAll('cards');
  cards.sort((a, b) => {
    if (a.isPinned && !b.isPinned) return -1;
    if (!a.isPinned && b.isPinned) return 1;
    return b.createdAt - a.createdAt;
  });

  const searchTerm = document.getElementById('cardSearch')?.value?.toLowerCase() || '';
  const filtered = cards.filter(c => {
    if (!searchTerm) return true;
    const nameMatch = (c.name || '').toLowerCase().includes(searchTerm);
    const tagMatch = Array.isArray(c.tags) && c.tags.some(t => t.toLowerCase().includes(searchTerm));
    return nameMatch || tagMatch;
  });

  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('cardsEmpty');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = filtered.map(c => `
      <div class="card-item ${c.isPinned ? 'pinned' : ''}">
        ${c.isPinned ? '<span class="pin-badge">⭐</span>' : ''}
        <div class="card-item-avatar">
          ${c.avatar ? `<img src="${c.avatar}" alt="${escHtml(c.name)}">` : '🎭'}
        </div>
        <div class="card-item-name">${escHtml(c.name)}</div>
        <div class="card-item-desc">${escHtml(c.description || '无描述')}</div>
        ${c.tags && c.tags.length ? `<div class="card-item-tags">${c.tags.map(t => `<span class="card-tag">${escHtml(t)}</span>`).join('')}</div>` : ''}
        <div class="card-item-actions">
          <button class="btn-pin" onclick="togglePin(${c.id})">${c.isPinned ? '📌 取消置顶' : '⭐ 置顶'}</button>
          <button onclick="editCardFromLibrary(${c.id})">✏️ 编辑</button>
          <button onclick="startChatEdit(${c.id})" style="color:var(--primary);border-color:var(--primary);">💬 AI修改</button>
          <button onclick="exportCardJSON(${c.id})">📄 JSON</button>

          <button class="btn-danger" onclick="deleteCard(${c.id})">🗑️ 删除</button>
        </div>
      </div>
    `).join('');
  }
}

async function exportCardPNG(id) {
  const card = await dbGet('cards', id);
  if (!card) return;

  const json = buildCardV2JSON(card);
  const jsonStr = JSON.stringify(json);
  // UTF-8 safe base64 encoding
  const base64Data = utf8ToBase64(jsonStr);

  // Create a simple PNG with embedded chara tEXt chunk
  // Generate an avatar image via canvas
  const canvas = document.createElement('canvas');
  canvas.width = 400;
  canvas.height = 600;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const gradient = ctx.createLinearGradient(0, 0, 400, 600);
  gradient.addColorStop(0, '#7ec8e3');
  gradient.addColorStop(1, '#3a7cc3');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 400, 600);

  // Draw character name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 32px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(card.name || 'Character', 200, 300);

  ctx.font = '16px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.fillText('SillyTavern Character Card', 200, 340);

  // Get PNG data URL
  const pngDataUrl = canvas.toDataURL('image/png');
  const base64Image = pngDataUrl.split(',')[1];
  const binaryStr = atob(base64Image);
  const bytes = new Uint8Array(binaryStr.length);
  for (let i = 0; i < binaryStr.length; i++) {
    bytes[i] = binaryStr.charCodeAt(i);
  }

  // Inject tEXt chunk with chara data
  const pngWithChara = injectTextChunk(bytes, 'chara', base64Data);
  const blob = new Blob([pngWithChara], { type: 'image/png' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = `${card.name || 'character'}.png`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast('PNG 角色卡已下载，可直接导入 SillyTavern', 'success');
}

function injectTextChunk(pngBytes, keyword, value) {
  // PNG signature: 8 bytes
  // IHDR chunk
  // ... other chunks
  // We insert our tEXt chunk right after IHDR

  const sigLen = 8;
  // Find the end of IHDR (first chunk after signature)
  let pos = sigLen;
  // Read IHDR length
  const ihdrLen = (pngBytes[pos] << 24) | (pngBytes[pos+1] << 16) | (pngBytes[pos+2] << 8) | pngBytes[pos+3];
  const ihdrEnd = pos + 4 + 4 + ihdrLen + 4; // length(4) + type(4) + data + crc(4)

  // Build tEXt chunk
  const keywordBytes = new TextEncoder().encode(keyword);
  const nullSep = new Uint8Array([0]);
  const valueBytes = new TextEncoder().encode(value);
  const chunkData = new Uint8Array(keywordBytes.length + 1 + valueBytes.length);
  chunkData.set(keywordBytes, 0);
  chunkData.set(nullSep, keywordBytes.length);
  chunkData.set(valueBytes, keywordBytes.length + 1);

  const typeBytes = new TextEncoder().encode('tEXt');
  const len = chunkData.length;
  const lenBytes = new Uint8Array(4);
  lenBytes[0] = (len >> 24) & 0xFF;
  lenBytes[1] = (len >> 16) & 0xFF;
  lenBytes[2] = (len >> 8) & 0xFF;
  lenBytes[3] = len & 0xFF;

  // CRC of type + data
  const crcData = new Uint8Array(4 + len);
  crcData.set(typeBytes, 0);
  crcData.set(chunkData, 4);
  const crc = crc32(crcData);
  const crcBytes = new Uint8Array(4);
  crcBytes[0] = (crc >>> 24) & 0xFF;
  crcBytes[1] = (crc >>> 16) & 0xFF;
  crcBytes[2] = (crc >>> 8) & 0xFF;
  crcBytes[3] = crc & 0xFF;

  // Assemble
  const result = new Uint8Array(ihdrEnd + 4 + 4 + len + 4 + (pngBytes.length - ihdrEnd));
  result.set(pngBytes.subarray(0, ihdrEnd), 0);
  result.set(lenBytes, ihdrEnd);
  result.set(typeBytes, ihdrEnd + 4);
  result.set(chunkData, ihdrEnd + 8);
  result.set(crcBytes, ihdrEnd + 8 + len);
  result.set(pngBytes.subarray(ihdrEnd), ihdrEnd + 8 + len + 4);

  return result;
}

// CRC32 implementation
function crc32(data) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < data.length; i++) {
    crc ^= data[i];
    for (let j = 0; j < 8; j++) {
      if (crc & 1) {
        crc = (crc >>> 1) ^ 0xEDB88320;
      } else {
        crc = crc >>> 1;
      }
    }
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

// UTF-8 safe base64 encoding (avoids deprecated unescape)
function utf8ToBase64(str) {
  const encoder = new TextEncoder();
  const bytes = encoder.encode(str);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

function downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================
// ===== Import Card Functions =====
// ============================================================
async function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  try {
    if (file.name.endsWith('.json')) {
      await importFromJSON(file);
    } else if (file.name.endsWith('.png')) {
      await importFromPNG(file);
    } else {
      showToast('不支持的文件格式，请选择 .json 或 .png 文件', 'error');
    }
  } catch (err) {
    showToast('导入失败: ' + err.message, 'error');
    console.error(err);
  }

  // Reset file input so the same file can be re-imported
  event.target.value = '';
}

async function importFromJSON(file) {
  const text = await file.text();
  let data;
  try {
    data = JSON.parse(text);
  } catch (e) {
    throw new Error('JSON 解析失败，请检查文件格式');
  }

  const cardData = extractCardData(data);
  if (!cardData) throw new Error('无法识别的角色卡格式，请确保是 SillyTavern 格式');

  await dbAdd('cards', {
    ...cardData,
    avatar: '',
    isPinned: false,
    createdAt: Date.now(),
    updatedAt: Date.now()
  });

  await renderCardsPage();
  showToast(`已导入角色卡「${cardData.name || '未命名'}」`, 'success');
}

async function importFromPNG(file) {
  const arrayBuffer = await file.arrayBuffer();
  const bytes = new Uint8Array(arrayBuffer);

  // Extract tEXt chunks from PNG
  const charaJson = extractCharaFromPNG(bytes);
  if (!charaJson) throw new Error('PNG 中未找到角色卡数据，请确保是 SillyTavern 导出的角色卡');

  let data;
  try {
    data = JSON.parse(charaJson);
  } catch (e) {
    throw new Error('PNG 中的角色卡数据解析失败');
  }

  const cardData = extractCardData(data);
  if (!cardData) throw new Error('无法识别的角色卡格式');

  await dbAdd('cards', {
    ...cardData,
    avatar: '',
    isPinned: false,
    createdAt: Date.now(),
    updatedAt: Date.now()
  });

  await renderCardsPage();
  showToast(`已导入角色卡「${cardData.name || '未命名'}」`, 'success');
}

function extractCardData(data) {
  // SillyTavern V2 format: { spec: "chara_card_v2", data: { ... } }
  if (data.spec === 'chara_card_v2' && data.data) {
    const d = data.data;
    return {
      name: d.name || '',
      description: d.description || '',
      personality: d.personality || '',
      scenario: d.scenario || '',
      first_mes: d.first_mes || '',
      mes_example: d.mes_example || '',
      tags: Array.isArray(d.tags) ? d.tags : [],
      creator_notes: d.creator_notes || ''
    };
  }
  // Raw card data (V1 or plain object with known fields)
  if (data.name !== undefined || data.description !== undefined) {
    return {
      name: data.name || '',
      description: data.description || '',
      personality: data.personality || '',
      scenario: data.scenario || '',
      first_mes: data.first_mes || '',
      mes_example: data.mes_example || '',
      tags: Array.isArray(data.tags) ? data.tags : [],
      creator_notes: data.creator_notes || ''
    };
  }
  return null;
}

function extractCharaFromPNG(bytes) {
  // PNG signature: 8 bytes
  if (bytes[0] !== 137 || bytes[1] !== 80 || bytes[2] !== 78 || bytes[3] !== 71) {
    return null; // Not a PNG
  }

  let pos = 8;
  while (pos < bytes.length - 12) {
    // Read chunk length (4 bytes, big-endian)
    const len = (bytes[pos] << 24) | (bytes[pos+1] << 16) | (bytes[pos+2] << 8) | bytes[pos+3];
    // Read chunk type (4 bytes)
    const type = String.fromCharCode(bytes[pos+4], bytes[pos+5], bytes[pos+6], bytes[pos+7]);

    if (type === 'tEXt') {
      // Read chunk data
      const chunkData = bytes.subarray(pos + 8, pos + 8 + len);
      // Find null separator between keyword and text
      const nullIdx = chunkData.indexOf(0);
      if (nullIdx > 0) {
        const keyword = new TextDecoder().decode(chunkData.subarray(0, nullIdx));
        if (keyword === 'chara') {
          const value = new TextDecoder().decode(chunkData.subarray(nullIdx + 1));
          // Value is base64-encoded JSON
          try {
            const json = atob(value);
            return json;
          } catch (e) {
            return null;
          }
        }
      }
    }

    // Move to next chunk
    pos += 12 + len; // len(4) + type(4) + data(len) + crc(4)
  }

  return null;
}

// ============================================================
// ===== Panel Collapse (ChatGPT style) =====
// ============================================================
function toggleCollapsePanel(name) {
  const el = document.querySelector(name === 'convList' ? '.conv-list' : '#cardPreview');
  const btn = document.getElementById(name === 'convList' ? 'toggleConvList' : 'toggleCardPreview');
  if (!el) return;
  el.classList.toggle('collapsed');
  // Flip the arrow direction
  if (btn) {
    btn.classList.toggle('flipped', el.classList.contains('collapsed'));
  }
  // Save state to localStorage
  saveCollapseState();
}

function saveCollapseState() {
  const state = {
    convList: document.querySelector('.conv-list').classList.contains('collapsed'),
    cardPreview: document.getElementById('cardPreview').classList.contains('collapsed')
  };
  localStorage.setItem('panelCollapseState', JSON.stringify(state));
}

function restoreCollapseState() {
  const saved = localStorage.getItem('panelCollapseState');
  if (!saved) return;
  try {
    const state = JSON.parse(saved);
    if (state.convList) {
      document.querySelector('.conv-list').classList.add('collapsed');
      document.getElementById('toggleConvList').classList.add('flipped');
    }
    if (state.cardPreview) {
      document.getElementById('cardPreview').classList.add('collapsed');
      document.getElementById('toggleCardPreview').classList.add('flipped');
    }
  } catch (e) {}
}

// ============================================================
// ===== Conversation Rename =====
// ============================================================
function startRenameConv(id, event) {
  event.stopPropagation();
  const item = document.querySelector(`.conv-item[data-cid="${id}"]`);
  if (!item) return;
  const titleEl = item.querySelector('.conv-item-title');
  const current = titleEl.textContent.replace('🔄 ', '');
  titleEl.innerHTML = `<input class="conv-edit-input" value="${escHtml(current)}" id="renameInput_${id}" onkeydown="if(event.key==='Enter')saveRenameConv(${id})" onclick="event.stopPropagation()">`;
  document.getElementById(`renameInput_${id}`).focus();
  document.getElementById(`renameInput_${id}`).select();
}

async function saveRenameConv(id) {
  const input = document.getElementById(`renameInput_${id}`);
  if (!input) return;
  const newTitle = input.value.trim();
  if (!newTitle) { renderConvList(); return; }
  const conv = await dbGet('conversations', id);
  if (conv) { conv.title = newTitle; conv.updatedAt = Date.now(); await dbPut('conversations', conv); }
  if (state.currentConvId === id && state.currentConversation) { state.currentConversation.title = newTitle; }
  renderConvList();
}

// ============================================================
// ===== Message Actions =====
// ============================================================
function editMessage(idx) {
  if (state.isGenerating) return;
  const conv = state.currentConversation;
  if (!conv || idx >= conv.messages.length) return;
  state.editingMessageIdx = idx;
  renderMessages();
  // Focus the edit textarea after render
  requestAnimationFrame(() => {
    const ta = document.getElementById(`editMsg_${idx}`);
    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
  });
}

async function saveMessageEdit(idx) {
  const conv = state.currentConversation;
  if (!conv) return;
  const ta = document.getElementById(`editMsg_${idx}`);
  if (!ta) return;
  const newContent = ta.value.trim();
  if (!newContent) { showToast('消息不能为空', 'error'); return; }

  const isUserMessage = conv.messages[idx].role === 'user';

  // Update the message content
  conv.messages[idx].content = newContent;

  if (isUserMessage) {
    // User message: truncate after this, resend to AI
    conv.messages = conv.messages.slice(0, idx + 1);
    conv.updatedAt = Date.now();
    state.editingMessageIdx = -1;
    renderMessages();
    await dbPut('conversations', conv);
    await resendToAI();
  } else {
    // AI message: just update content, no resend
    conv.updatedAt = Date.now();
    state.editingMessageIdx = -1;
    renderMessages();
    await dbPut('conversations', conv);
    showToast('AI 消息已修改', 'success');
  }
}

function cancelMessageEdit() {
  state.editingMessageIdx = -1;
  renderMessages();
}

async function resendToAI() {
  const conv = state.currentConversation;
  if (!conv) return;
  const apiConfigId = document.getElementById('chatApiSelect').value;
  const personaId = document.getElementById('chatPersonaSelect').value;
  if (!apiConfigId || !personaId) { showToast('请选择 API 和 AI 人设', 'error'); return; }

  state.generatingForConvId = conv.id;
  document.getElementById('btnSend').disabled = true;
  document.getElementById('btnStopGenerate').style.display = 'inline-block';
  state.isGenerating = true;

  // Show typing indicator
  const msgContainer = document.getElementById('messagesContainer');
  const typingEl = document.createElement('div');
  typingEl.className = 'message ai';
  typingEl.id = 'typingIndicator';
  typingEl.innerHTML = `<div class="message-avatar">🎀</div><div class="message-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  msgContainer.appendChild(typingEl);
  msgContainer.scrollTop = msgContainer.scrollHeight;

  abortController = new AbortController();
  try {
    const response = await callAIWithAbort(apiConfigId, personaId, conv.messages, abortController.signal);
    const ti = document.getElementById('typingIndicator');
    if (ti) ti.remove();
    appendMessage('assistant', response);
  } catch (err) {
    const ti = document.getElementById('typingIndicator');
    if (ti) ti.remove();
    if (err.name !== 'AbortError') { showToast('发送失败: ' + err.message, 'error'); }
  }

  abortController = null;
  state.isGenerating = false;
  state.generatingForConvId = null;
  document.getElementById('btnSend').disabled = false;
  document.getElementById('btnStopGenerate').style.display = 'none';
}

async function regenerateMessage(idx) {
  if (state.isGenerating) return;
  const conv = state.currentConversation;
  if (!conv) return;
  // Delete this AI message and resend
  conv.messages = conv.messages.slice(0, idx);
  conv.updatedAt = Date.now();
  renderMessages();
  await dbPut('conversations', conv);
  await resendToAI();
}

function deleteMessage(idx) {
  if (state.isGenerating) return;
  const conv = state.currentConversation;
  if (!conv) return;
  showConfirm('确定删除这条消息吗？之后的对话也会被截断。', async () => {
    conv.messages = conv.messages.slice(0, idx);
    conv.updatedAt = Date.now();
    await dbPut('conversations', conv);
    renderMessages();
  });
}

function copyMessage(idx) {
  const conv = state.currentConversation;
  if (!conv) return;
  const msg = conv.messages[idx];
  if (!msg) return;
  navigator.clipboard.writeText(msg.content).then(() => showToast('已复制到剪贴板', 'success'));
}

// ============================================================
// ===== Stop Generation =====
// ============================================================
let abortController = null;

async function stopGeneration() {
  if (abortController) {
    abortController.abort();
    abortController = null;
  }
  state.isGenerating = false;
  state.generatingForConvId = null;
  document.getElementById('btnSend').disabled = false;
  document.getElementById('btnStopGenerate').style.display = 'none';
  // Remove typing indicator
  const ti = document.getElementById('typingIndicator');
  if (ti) ti.remove();
  showToast('已停止生成', 'info');
}

// ============================================================
// ===== World Book =====
// ============================================================
let worldBookEntries = [];

function addWorldBookEntry(data = {}) {
  worldBookEntries.push({
    title: data.title || '',
    keys: data.keys || '',
    position: data.position || 'before_char',
    depth: data.depth || 0,
    content: data.content || '',
    constant: data.constant !== undefined ? data.constant : false
  });
  renderWorldBookEntries();
}

function removeWorldBookEntry(idx) {
  worldBookEntries.splice(idx, 1);
  renderWorldBookEntries();
}

function renderWorldBookEntries() {
  const container = document.getElementById('worldBookEntries');
  if (!container) return;
  if (worldBookEntries.length === 0) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text-secondary);padding:8px 0;">暂无世界书条目</div>';
    return;
  }
  container.innerHTML = worldBookEntries.map((e, i) => `
    <div class="world-book-entry">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:11px;font-weight:600;color:var(--text-secondary);">条目 ${i + 1}</span>
        <button class="btn-remove-wb" onclick="removeWorldBookEntry(${i})">✕</button>
      </div>
      <input type="text" placeholder="标题" value="${escHtml(e.title)}" onchange="worldBookEntries[${i}].title=this.value">
      <div class="world-book-entry-row">
        <input type="text" placeholder="触发词 (逗号分隔)" value="${escHtml(e.keys)}" onchange="worldBookEntries[${i}].keys=this.value">
        <select onchange="worldBookEntries[${i}].constant=this.value==='true'" style="padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;">
          <option value="false" ${!e.constant?'selected':''}>关键词触发</option>
          <option value="true" ${e.constant?'selected':''}>始终生效</option>
        </select>
      </div>
      <div class="world-book-entry-row">
        <select onchange="worldBookEntries[${i}].position=this.value" style="padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;">
          <option value="before_char" ${e.position==='before_char'?'selected':''}>角色前</option>
          <option value="after_char" ${e.position==='after_char'?'selected':''}>角色后</option>
        </select>
        <input type="number" placeholder="深度" value="${e.depth}" style="width:60px;" onchange="worldBookEntries[${i}].depth=parseInt(this.value)||0">
      </div>
      <textarea placeholder="世界书内容..." rows="3" onchange="worldBookEntries[${i}].content=this.value">${escHtml(e.content)}</textarea>
    </div>
  `).join('');
}

// ============================================================
// ===== Resizable Chat Input =====
// ============================================================
const INPUT_MIN_H = 60;
const INPUT_MAX_H = 300;
const INPUT_STORAGE_KEY = 'chatInputHeight';

function initInputResize() {
  const handle = document.getElementById('inputResizeHandle');
  const inputArea = document.getElementById('chatInputArea');
  if (!handle || !inputArea) return;

  // Restore saved height
  const saved = localStorage.getItem(INPUT_STORAGE_KEY);
  if (saved) {
    const h = parseInt(saved);
    if (h >= INPUT_MIN_H && h <= INPUT_MAX_H) {
      inputArea.style.height = h + 'px';
    }
  }

  let dragging = false;
  let startY = 0;
  let startH = 0;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    dragging = true;
    startY = e.clientY;
    startH = inputArea.offsetHeight;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'ns-resize';
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const delta = startY - e.clientY;
    let newH = startH + delta;
    newH = Math.max(INPUT_MIN_H, Math.min(INPUT_MAX_H, newH));
    inputArea.style.height = newH + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
    localStorage.setItem(INPUT_STORAGE_KEY, inputArea.offsetHeight);
  });
}

// ============================================================
// ===== Init =====
// ============================================================
async function init() {
  await openDB();

  // Restore panel collapse state
  restoreCollapseState();

  // Init resizable input
  initInputResize();

  // Ensure system personas exist and are up-to-date
  const personas = await dbGetAll('aiPersonas');

  // Remove old default persona if exists
  const oldDefault = personas.find(p => p.name === '通用角色卡助手');
  if (oldDefault) await dbDelete('aiPersonas', oldDefault.id);

  // Upsert system personas
  const systemPersonas = [
    { name: 'ai写卡助手', description: '一个经验极深的 SillyTavern 角色卡写手', prompt: AIWRITER_PROMPT, avatar: '✍️' },
    { name: '柚乃', description: '二次元助手少女', prompt: YUZUNA_PROMPT, avatar: '🌸' },
    { name: '郭德纲', description: '相声演员郭德纲老师在线写卡', prompt: GUODEGANG_PROMPT, avatar: '🎤' }
  ];

  for (const sp of systemPersonas) {
    const existing = personas.find(p => p.name === sp.name);
    if (existing) {
      // Re-read fresh from DB to avoid stale object issues
      const fresh = await dbGet('aiPersonas', existing.id);
      if (fresh) {
        fresh.systemPrompt = sp.prompt;
        fresh.description = sp.description;
        fresh.isSystem = true;
        fresh.avatar = sp.avatar;
        fresh.updatedAt = Date.now();
        await dbPut('aiPersonas', fresh);
      }
    } else {
      await dbAdd('aiPersonas', {
        name: sp.name,
        description: sp.description,
        systemPrompt: sp.prompt,
        isSystem: true,
        avatar: sp.avatar,
        createdAt: Date.now(),
        updatedAt: Date.now()
      });
    }
  }

  // Load initial page from hash
  const hash = window.location.hash.replace('#', '') || 'chat';
  switchPage(hash);

  // Refresh selects
  await refreshApiSelects();
  await refreshPersonaSelects();

  // Render conversation list
  await renderConvList();
}

init().catch(err => {
  console.error('Init error:', err);
  showToast('初始化失败: ' + err.message, 'error');
});
